<!DOCTYPE html>
<!--
  custo.html — AgroCalc
  Calculadora de Custo de Produção por Hectare.
  data-page="custo" → nav marca "Custo" como ativo.
  Os cálculos são feitos em custo.py via /api/custo.
  O custo.js envia os dados e exibe os resultados.
-->
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgroCalc — Calculadora de Custo</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/custo.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body data-page="custo">

  <div id="site-header"></div>

  <main>
    <h1 class="secao-titulo">Calculadora de Custo de Produção</h1>
    <p>Calcula o custo total, receita e ponto de equilíbrio usando a função afim:
      <strong>C(x) = custo_fixo + custo_variável × x</strong>
    </p>

    <!-- Formulário -->
    <div class="card" style="max-width:560px; margin-top:1.5rem;">
      <h2 style="margin-bottom:1rem;">Informe os dados</h2>

      <label for="custo-fixo">Custo fixo (R$):</label>
      <input type="number" id="custo-fixo" placeholder="Ex: 1500" min="0">

      <label for="custo-variavel">Custo variável por saca (R$):</label>
      <input type="number" id="custo-variavel" placeholder="Ex: 85" min="0">

      <label for="preco-venda">Preço de venda por saca (R$):</label>
      <input type="number" id="preco-venda" placeholder="Ex: 120" min="0">

      <label for="sacas">Quantidade de sacas produzidas:</label>
      <input type="number" id="sacas" placeholder="Ex: 200" min="0">

      <button class="btn-primario" onclick="calcularCusto()" style="margin-top:1rem;width:100%;">
        Calcular
      </button>
    </div>

    <!-- Resultado (oculto até calcular) -->
    <div id="resultado" style="display:none; margin-top:2rem;">

      <!-- Cards de resumo -->
      <div class="resumo-grid">
        <div class="resumo-item">
          <span class="resumo-label">Custo Total</span>
          <span class="resumo-valor" id="res-custo-total">—</span>
        </div>
        <div class="resumo-item">
          <span class="resumo-label">Receita</span>
          <span class="resumo-valor" id="res-receita">—</span>
        </div>
        <div class="resumo-item">
          <span class="resumo-label">Lucro / Prejuízo</span>
          <span class="resumo-valor" id="res-lucro">—</span>
        </div>
        <div class="resumo-item">
          <span class="resumo-label">Ponto de Equilíbrio</span>
          <span class="resumo-valor" id="res-equilibrio">—</span>
        </div>
      </div>

      <!-- Gráfico gerado pelo Matplotlib -->
      <div class="card" style="margin-top:1.5rem; text-align:center;">
        <h2 style="margin-bottom:1rem;">Gráfico Custo × Receita</h2>
        <img id="grafico-custo" class="grafico-custo" src="" alt="Gráfico de custo e receita">

        <button class="btn-primario" style="margin-top: 0.8rem;" onclick="window.location.href='/baixar-grafico'">
          Salvar Gráfico
        </button>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>
  <script src="/static/js/nav.js"></script>
  <script src="/static/js/custo.js"></script>

</body>

</html>
